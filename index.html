<script>
// ===== STATE =====
let C={sheetId:'',apiUrl:'',demo:false};
let TX=[],ST=[],REC=[];

// ===== LOAD SHEETS (đã thêm 2 cột mới) =====
async function loadSheets(id){
  const base=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv`;
  const enc=s=>encodeURIComponent(s);
  const [sr,tr]=await Promise.all([
    fetch(base+'&sheet='+enc('Cửa hàng')),
    fetch(base+'&sheet='+enc('Giao dịch'))
  ]);
  const [sc,tc]=[await sr.text(),await tr.text()];

  ST=parseCSV(sc).slice(1).filter(r=>r[0]&&clean(r[0])!=='ID').map(r=>({
    id:clean(r[0]),
    name:clean(r[1]),
    addr:clean(r[2]),
    area:clean(r[3]),
    email:clean(r[4]),
    openDate:clean(r[5]),
    status:clean(r[6])||'active',
    // === 2 cột mới ===
    owner:clean(r[7])||'',           // “Tên chủ chi nhánh”
    phone:clean(r[8])||''            // “SĐT chủ chi nhánh”
  }));

  TX=... (giữ nguyên)
}

// ===== FORM CỬA HÀNG (đã thêm 2 trường) =====
function openAddStore(){
  editingStoreId=null;
  document.getElementById('sform-title').textContent='➕ Thêm cửa hàng';
  // ... reset các field cũ
  document.getElementById('sf-owner').value='';   // Tên chủ chi nhánh
  document.getElementById('sf-phone').value='';   // SĐT chủ
  document.getElementById('store-modal').classList.remove('off');
}

function editStore(id){
  const s=ST.find(x=>x.id===id);
  // ... fill các field cũ + 2 field mới
  document.getElementById('sf-owner').value=s.owner||'';
  document.getElementById('sf-phone').value=s.phone||'';
}

function saveStore(){
  // ... lấy giá trị cũ + 2 trường mới
  const owner=document.getElementById('sf-owner').value.trim();
  const phone=document.getElementById('sf-phone').value.trim();
  
  if(editingStoreId){
    const idx=ST.findIndex(s=>s.id===editingStoreId);
    if(idx>=0) ST[idx]={...ST[idx], owner, phone};
  } else {
    ST.push({id, name, area, addr, email, owner, phone, openDate, status});
  }
  // ... render lại
}

// ===== SAVE STORES TO SHEET (đã thêm 2 cột) =====
async function saveStoresToSheet(){
  if(!C.apiUrl){toast('Cần API URL','terr');return;}
  load('Đang lưu...');
  try{
    await fetch(C.apiUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveStores',stores:ST})});
    toast('✓ Đã lưu lên Sheets','tok');
  }catch(e){toast('Lỗi','terr');}
  finally{unload();}
}
