<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phúc Tea P&L Hub - Fabi Optimized</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #F5A623; --gold-l: #FDF3E3; --brown: #3D2B1F;
      --red: #E53E3E; --green: #2D8248; --blue: #2B6CB0; --blue-l: #EBF8FF;
      --gray: #718096; --white: #fff; --bg: #F7F8FA; --r: 12px;
    }
    * { box-sizing: border-box; font-family: 'Be+Vietnam+Pro', sans-serif; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--brown); padding-bottom: 80px; }
    
    /* Giao diện Header & Tab */
    .header { background: var(--white); padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
    .nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 1px solid #eee; padding: 10px 0; }
    .nav-item { flex: 1; text-align: center; font-size: 11px; cursor: pointer; color: var(--gray); }
    .nav-item.active { color: var(--gold); font-weight: 700; }

    .page { display: none; padding: 15px; max-width: 800px; margin: auto; }
    .page.active { display: block; }

    /* Card Layout */
    .card { background: var(--white); border-radius: var(--r); padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 600px) { .g2 { grid-template-columns: 1fr; } }

    /* Excel Card Thu gọn */
    .xlsx-card { background: var(--blue-l); border: 1.5px dashed var(--blue); padding: 12px; border-radius: var(--r); margin-top: 15px; }
    .xlsx-header { display: flex; align-items: center; justify-content: space-between; }
    
    /* Form input */
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; outline: none; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .bp { background: var(--gold); color: var(--white); }
    .bs { background: var(--blue); color: var(--white); }

    /* List Item */
    .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .badge-chi { color: var(--red); font-size: 11px; font-weight: 700; }
    .badge-thu { color: var(--green); font-size: 11px; font-weight: 700; }
  </style>
</head>
<body>

  <div class="header">
    <h2 style="color:var(--gold)">Phúc Tea P&L Hub</h2>
  </div>

  <div id="p-input" class="page active">
    <div class="g2">
      <div>
        <div class="card" id="imgZone">
          <h4 style="margin-bottom:10px">📲 Nhập từ ảnh (AI)</h4>
          <input type="file" accept="image/*" id="camInp" onchange="handleImage(this)">
          <p style="font-size:11px; color:var(--gray); margin-top:5px">Chụp ảnh báo cáo ngày để AI phân tích.</p>
        </div>

        <div id="xlsxZone" class="xlsx-card">
          <div class="xlsx-header">
             <div style="font-weight:700; color:var(--blue); font-size:13px">📊 EXCEL → TỰ ĐỘNG</div>
             <button class="btn bs" style="padding:4px 10px; font-size:11px" onclick="document.getElementById('xlf').click()">Chọn File</button>
             <input type="file" id="xlf" hidden accept=".xlsx,.xls,.csv" onchange="readXlsx(this)">
          </div>
          <p style="font-size:11px; color:var(--blue); opacity:0.8; margin-top:4px">Dành cho báo cáo nguồn Fabi (iPos)</p>
        </div>
      </div>

      <div id="confirmZone">
        <div class="card">
          <h4>Xác nhận giao dịch</h4>
          <div id="previewList" style="margin: 10px 0; max-height: 300px; overflow-y: auto;">
            <p style="color:var(--gray); font-size:13px">Chưa có dữ liệu được nạp...</p>
          </div>
          <button id="btnSaveAll" class="btn bp" style="width:100%; display:none;" onclick="saveAllTransactions()">Lưu vào hệ thống</button>
        </div>
      </div>
    </div>
  </div>

  <div id="p-store" class="page">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h4>Quản lý cửa hàng</h4>
        <button class="btn bs" onclick="openStoreModal()">+ Thêm</button>
      </div>
      <div id="storeList" style="margin-top:15px"></div>
    </div>
  </div>

  <div id="p-rec" class="page">
    <div class="card">
      <h4>Lịch sử ghi nhận</h4>
      <div id="recList" style="margin-top:10px"></div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" onclick="showPage('p-input', this)">📥 Nhập liệu</div>
    <div class="nav-item" onclick="showPage('p-store', this)">🏠 Cửa hàng</div>
    <div class="nav-item" onclick="showPage('p-rec', this)">📜 Lịch sử</div>
  </div>

  <div id="storeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center">
    <div class="card" style="width:90%; max-width:400px">
      <h3>Thêm cửa hàng mới</h3>
      <input type="text" id="s_name" placeholder="Tên cửa hàng (Ví dụ: PHUCTEA068 - HÀ LAM)">
      <input type="text" id="s_owner" placeholder="Tên chủ cửa hàng">
      <input type="tel" id="s_phone" placeholder="Số điện thoại">
      <input type="text" id="s_addr" placeholder="Địa chỉ">
      <div style="display:flex; gap:10px; margin-top:15px">
        <button class="btn bp" style="flex:1" onclick="saveNewStore()">Lưu</button>
        <button class="btn" style="flex:1" onclick="this.parentElement.parentElement.parentElement.style.display='none'">Hủy</button>
      </div>
    </div>
  </div>

  <script>
    let STORES = JSON.parse(localStorage.getItem('pts_stores')) || [];
    let TX_PENDING = []; // Dữ liệu chờ lưu
    let TX_HISTORY = JSON.parse(localStorage.getItem('pts_history')) || [];
    const API_URL = "URL_APPS_SCRIPT_CỦA_BẠN_DÁN_VÀO_ĐÂY"; // THAY URL VÀO ĐÂY

    // 1. CHUYỂN TRANG
    function showPage(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      if(id === 'p-store') renderStores();
      if(id === 'p-rec') renderHistory();
    }

    // 2. LOGIC CỬA HÀNG
    function openStoreModal() { document.getElementById('storeModal').style.display='flex'; }

    function saveNewStore() {
      const s = {
        id: "ST" + Date.now(),
        name: document.getElementById('s_name').value,
        owner: document.getElementById('s_owner').value,
        phone: document.getElementById('s_phone').value,
        addr: document.getElementById('s_addr').value,
        date: new Date().toLocaleDateString()
      };
      if(!s.name) return alert("Vui lòng nhập tên!");
      STORES.push(s);
      localStorage.setItem('pts_stores', JSON.stringify(STORES));
      syncStores();
      document.getElementById('storeModal').style.display='none';
      renderStores();
    }

    function renderStores() {
      const html = STORES.map(s => `
        <div class="item">
          <div>
            <div style="font-weight:700">${s.name}</div>
            <div style="font-size:11px; color:var(--gray)">Chủ: ${s.owner} - ${s.phone}</div>
          </div>
          <button onclick="deleteStore('${s.id}')" style="color:red; background:none; border:none">Xóa</button>
        </div>
      `).join('');
      document.getElementById('storeList').innerHTML = html || "Chưa có cửa hàng nào.";
    }

    async function syncStores() {
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'saveStores', stores: STORES })
        });
      } catch (e) { console.error("Lỗi sync:", e); }
    }

    // 3. LOGIC EXCEL (FABI)
    async function readXlsx(input) {
      const file = input.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        TX_PENDING = [];

        workbook.SheetNames.forEach(name => {
          const sheet = workbook.Sheets[name];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          if (rows.length < 5) return;

          // A. Tìm tên cửa hàng (Dòng 1)
          let firstRowStr = rows[0].join(" ");
          let storeName = "";
          if (firstRowStr.includes("tại cửa hàng")) {
            storeName = firstRowStr.split("tại cửa hàng")[1].trim().replace(/\.$/, "");
          } else {
            storeName = name; // Mặc định lấy tên sheet nếu ko tìm thấy
          }

          // Tìm thông tin chủ từ danh sách STORES đã có
          const storeInfo = STORES.find(s => storeName.includes(s.name) || s.name.includes(storeName)) || {owner:"", phone:""};

          // B. Tìm dòng "Tổng" và Headers
          const headerRowIdx = rows.findIndex(r => r.includes("Tên nguồn") || r.includes("Nguồn"));
          const totalRowIdx = rows.findIndex(r => String(r[0]).trim() === "Tổng");

          if (headerRowIdx > -1 && totalRowIdx > -1) {
            const headers = rows[headerRowIdx];
            const subHeaders = rows[headerRowIdx + 1];
            const totals = rows[totalRowIdx];

            headers.forEach((cell, idx) => {
              if (cell && cell !== "Ngày" && cell !== "Tổng" && cell !== "Tên điểm") {
                // Quét trong phạm vi 10 cột kể từ cột tên nguồn để tìm Gross và Giảm giá
                let gross = 0, discount = 0;
                for (let i = idx; i < idx + 8; i++) {
                  let subTxt = String(subHeaders[i] || "");
                  if (subTxt.includes("gross")) gross = parseFloat(totals[i]) || 0;
                  if (subTxt.includes("Giảm giá")) discount = parseFloat(totals[i]) || 0;
                }

                if (gross > 0) {
                  TX_PENDING.push({
                    date: new Date().toLocaleDateString('en-CA'),
                    store: storeName,
                    owner: storeInfo.owner,
                    phone: storeInfo.phone,
                    type: 'Thu',
                    category: cell,
                    amount: gross,
                    note: `Excel: ${cell}`
                  });
                }
                if (discount > 0) {
                  let catChi = (cell.toLowerCase().includes("grab") || cell.toLowerCase().includes("shopee")) 
                               ? "Chiết khấu food app" : "Chiết khấu CTKM";
                  TX_PENDING.push({
                    date: new Date().toLocaleDateString('en-CA'),
                    store: storeName,
                    owner: storeInfo.owner,
                    phone: storeInfo.phone,
                    type: 'Chi',
                    category: catChi,
                    amount: discount,
                    note: `Excel: Chiết khấu ${cell}`
                  });
                }
              }
            });
          }
        });
        renderPreview();
      };
      reader.readAsArrayBuffer(file);
    }

    // 4. HIỂN THỊ XÁC NHẬN & LƯU
    function renderPreview() {
      const html = TX_PENDING.map(t => `
        <div class="item">
          <div>
            <div style="font-size:12px; font-weight:700">${t.store}</div>
            <div style="font-size:11px">${t.category}</div>
          </div>
          <div style="text-align:right">
            <div class="badge-${t.type.toLowerCase()}">${t.type === 'Thu' ? '+' : '-'}${t.amount.toLocaleString()}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('previewList').innerHTML = html || "Không tìm thấy dữ liệu hợp lệ.";
      document.getElementById('btnSaveAll').style.display = TX_PENDING.length ? 'block' : 'none';
    }

    async function saveAllTransactions() {
      if (!confirm(`Lưu ${TX_PENDING.length} giao dịch vào Sheet?`)) return;
      const btn = document.getElementById('btnSaveAll');
      btn.innerText = "Đang lưu..."; btn.disabled = true;

      let count = 0;
      for (const tx of TX_PENDING) {
        try {
          await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'addTransaction', ...tx })
          });
          TX_HISTORY.unshift(tx);
          count++;
        } catch (e) { console.error(e); }
      }

      localStorage.setItem('pts_history', JSON.stringify(TX_HISTORY.slice(0, 100)));
      alert(`Đã lưu thành công ${count} giao dịch!`);
      TX_PENDING = [];
      renderPreview();
      btn.innerText = "Lưu vào hệ thống"; btn.disabled = false;
    }

    function renderHistory() {
      const html = TX_HISTORY.map(h => `
        <div class="item">
          <div style="font-size:12px"><b>${h.date}</b><br>${h.store}</div>
          <div style="text-align:right">
            <div class="badge-${h.type.toLowerCase()}" style="font-size:13px">${h.amount.toLocaleString()}</div>
            <div style="font-size:10px; color:var(--gray)">${h.category}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('recList').innerHTML = html || "Chưa có lịch sử.";
    }

    // Xóa cửa hàng
    function deleteStore(id) {
      if(confirm("Xóa cửa hàng này?")) {
        STORES = STORES.filter(s => s.id !== id);
        localStorage.setItem('pts_stores', JSON.stringify(STORES));
        renderStores();
        syncStores();
      }
    }
  </script>
</body>
</html>
